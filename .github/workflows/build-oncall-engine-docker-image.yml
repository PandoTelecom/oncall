name: Build and Push OnCall Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'engine/**'
      - '.github/workflows/publish-oncall.yml'
      - 'engine/Dockerfile'

  # Optional: let you run it manually too
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code (with Git LFS for .whl)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: engine/
          file: engine/Dockerfile
          target: prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            pandotelecom/oncall:latest
            pandotelecom/oncall:${{ github.sha }}
