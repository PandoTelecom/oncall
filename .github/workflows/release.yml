name: Release

on:
  push:
    tags:
      - 'v*'  # e.g. v1.0.0

jobs:
  release:
    permissions:
      id-token: write
      contents: write
      attestations: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⬇️ Minimal fix: run the action from the plugin root
      - name: Use grafana-plugin/ as workspace root
        shell: bash
        run: |
          shopt -s dotglob
          mv grafana-plugin/* .
          rmdir grafana-plugin || true

      - uses: grafana/plugin-actions/build-plugin@main
        with:
          policy_token: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}  # optional if you want signing
          attestation: true
          use_changelog_generator: true
