apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-testing-grafana-plugin-provisioning
  labels:
    app: {{ include "oncall.name" . }}
data:
  pando-oncall-app-provisioning.yaml: |
    apps:
      - type: pando-oncall-app
        name: pando-oncall-app
        disabled: false
        jsonData:
          stackId: 5
          orgId: 100
          onCallApiUrl: http://helm-testing-oncall-engine:8080
